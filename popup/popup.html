<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zenforces</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="zf-popup">

    <header class="zf-header">
      <div class="zf-header-text">
        <span class="zf-logo">⚡ Zenforces</span>
        <span class="zf-tagline">Focus on solving, not rating</span>
      </div>
      <span class="zf-version">v1.0</span>
    </header>

    <!-- Master toggle — always prominent at top -->
    <div class="zf-master-row">
      <span class="zf-master-label">Extension Enabled</span>
      <input type="checkbox" id="toggle-enabled" class="zf-toggle zf-toggle-master"
             role="switch" aria-label="Enable or disable Zenforces">
    </div>

    <div id="zf-feature-body">

      <p class="zf-section-label">Core</p>
      <div class="zf-card">
        <div class="zf-row">
          <label for="toggle-ratingHider">Hide Ratings &amp; Ranks</label>
          <input type="checkbox" id="toggle-ratingHider" class="zf-toggle"
                 role="switch" aria-label="Hide Ratings and Ranks">
        </div>
        <div class="zf-row">
          <label for="toggle-colorNeutralizer">Neutral Username Colors</label>
          <input type="checkbox" id="toggle-colorNeutralizer" class="zf-toggle"
                 role="switch" aria-label="Neutralize Username Colors">
        </div>
        <div class="zf-row">
          <label for="toggle-cleanUI">Clean UI</label>
          <input type="checkbox" id="toggle-cleanUI" class="zf-toggle"
                 role="switch" aria-label="Clean UI Mode">
        </div>
      </div>

      <p class="zf-section-label">Appearance</p>
      <div class="zf-card">
        <div class="zf-row">
          <label for="theme-select">Theme</label>
          <select id="theme-select" class="zf-select">
            <option value="none">Default</option>
            <option value="zen-dark">Zen Dark</option>
            <option value="deep-blue">Deep Blue</option>
            <option value="soft-light">Soft Light</option>
            <option value="warm-minimal">Warm Minimal</option>
            <option value="midnight-pro">Midnight Pro</option>
            <option value="twilight">Zen Twilight</option>
            <option value="noir">Zen Noir</option>
            <option value="oceanic">Zen Oceanic</option>
            <option value="solar">Zen Solar</option>
            <option value="amoled">AMOLED Black</option>
            <option value="purple-night">Purple Night</option>
            <option value="forest">Forest Calm</option>
          </select>
        </div>
        <div class="zf-row">
          <label for="username-color">Username Color</label>
          <div class="zf-color-wrap">
            <span id="color-preview" class="zf-color-dot" aria-hidden="true"></span>
            <input type="color" id="username-color" aria-label="Custom username color">
          </div>
        </div>
      </div>

      <p class="zf-section-label">Extras</p>
      <div class="zf-card">
        <div class="zf-row">
          <label for="toggle-submissionFeedback">Submission Toasts</label>
          <input type="checkbox" id="toggle-submissionFeedback" class="zf-toggle"
                 role="switch" aria-label="Submission Feedback Toasts">
        </div>
      </div>

    </div><!-- /zf-feature-body -->

    <footer class="zf-footer">Built for focus 🚀</footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
